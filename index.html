<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schoedel Design Vector AI — AI-Powered SVG Generator</title>
    <meta name="description" content="Generate stunning, production-ready SVG vector art from text prompts using Google's Gemini AI. Sign in with Google, bring your own API key, and start creating." />
    <meta name="google-site-verification" content="xwLyWN4gOWK-MGseZ3-V3CRNtnpcjlWu-WiLNOxypuk" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Reddit+Sans:ital,wght@0,200..900;1,200..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Inter"', 'sans-serif'],
              display: ['"Reddit Sans"', 'sans-serif'],
              mono: ['"Source Code Pro"', 'monospace'],
            },
            colors: {
              brand: {
                50: '#e6f4ff',
                100: '#b3e0ff',
                200: '#80ccff',
                300: '#4db8ff',
                400: '#1aa3ff',
                500: '#00A2FD',
                600: '#0077cc',
                700: '#005999',
                800: '#003c66',
                900: '#001e33',
                950: '#000f1a',
              },
              base: {
                50: '#FFFFFF',
                100: '#F9FAFB',
                200: '#ECEFF3',
                300: '#D1D5DB',
                400: '#9CA3AF',
                500: '#6B7280',
                600: '#4E4E4E',
                700: '#1C2A3C',
                800: '#111A28',
                900: '#061314',
                950: '#000000',
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Custom scrollbar for a cleaner look */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #061314;
      }
      ::-webkit-scrollbar-thumb {
        background: #1C2A3C;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #374151;
      }
    </style>
  <link rel="stylesheet" href="/index.css">
  </head>
  <body class="bg-[#101A28] antialiased">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
